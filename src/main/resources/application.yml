server:
  port: 8082
spring:
  application:
    name: rules-engine
  datasource:
    url: jdbc:postgresql://localhost:5432/sentinel?currentSchema=rules_engine
    username: sentinel
    password: sentinel
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        default_schema: rules_engine
  data:
    redis:
      host: localhost
      port: 6379
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
